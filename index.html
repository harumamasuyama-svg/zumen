<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZUMEN</title>
  <meta name="theme-color" content="#0f6bdc" />
  <link rel="icon" type="image/png" href="./public/favicon-32.png" />
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:#eef2f7;color:#1f2937} button,input,select,textarea{font:inherit} button{border:1px solid #d0d5dd;background:#fff;border-radius:6px;min-height:34px;padding:0 10px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:#344054} button:hover,button.active{border-color:#0f6bdc;color:#0f6bdc} button.active,.primary{background:#0f6bdc!important;color:#fff!important;border-color:#0f6bdc!important}.app{height:100vh;display:grid;grid-template-columns:154px 1fr 280px;grid-template-rows:54px 1fr;grid-template-areas:"top top top" "tools work props"}.top{grid-area:top;background:#fff;border-bottom:1px solid #d0d5dd;display:flex;align-items:center;gap:12px;padding:8px 14px}.brand{display:flex;align-items:center;gap:10px;min-width:280px}.brand img{width:112px;height:38px;object-fit:contain;object-position:left center}.brand span{font-size:13px;color:#667085}.menu{display:flex;gap:8px;align-items:center}.menu.right{margin-left:auto}.fileBtn input{display:none}.tools{grid-area:tools;background:#f8fafc;border-right:1px solid #d0d5dd;padding:10px;display:flex;flex-direction:column;gap:7px;overflow:auto}.tools button{justify-content:flex-start;width:100%}.work{grid-area:work;display:flex;flex-direction:column;min-width:0}.tabs{height:48px;background:#f8fafc;border-bottom:1px solid #d0d5dd;padding:8px 12px;display:flex;gap:8px}.stage{flex:1;min-height:0;overflow:hidden}.canvasBar{height:42px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;padding:6px 12px}.canvasWrap{height:calc(100% - 42px);display:grid;place-items:center;overflow:hidden;padding:22px}.canvasWrap canvas,.mini canvas{background:#fff;box-shadow:0 1px 4px rgba(16,24,40,.14);touch-action:none;transform-origin:0 0}.props{grid-area:props;background:#fff;border-left:1px solid #d0d5dd;padding:14px;overflow:auto}.props section{border-bottom:1px solid #eaecf0;padding-bottom:14px;margin-bottom:14px}h2{font-size:14px;margin:0 0 10px;color:#344054}label{display:block;font-size:12px;color:#667085;margin:9px 0 5px}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:6px;padding:8px;background:#fff}.seg{display:grid;grid-template-columns:1fr 1fr;gap:6px}.primary{width:100%;justify-content:center;margin-top:8px}.ghost{background:#fff!important;color:#0f6bdc!important}.compare{height:100%;padding:18px;gap:16px;overflow:auto}.compare.side{display:grid;grid-template-columns:1fr 1fr}.compare.stack{display:grid;grid-template-rows:auto auto}.compare.overlay{display:grid;place-items:center}.compare.overlay .mini{grid-area:1/1}.compare.overlay .mini:first-child{opacity:.35}.mini{background:#fff;border:1px solid #d0d5dd;border-radius:8px;padding:12px}.mini h3{margin:0 0 8px;font-size:14px}.mini canvas{width:100%;height:auto}.split{height:100%;display:grid;grid-template-columns:minmax(430px,1fr) minmax(360px,.85fr);gap:12px;padding:12px}.split .panel{background:#fff;border:1px solid #d0d5dd;border-radius:8px;overflow:hidden}.three{height:100%;display:grid;place-items:center;background:linear-gradient(#f8fafc,#eef2f7);perspective:900px}.model{position:relative;width:360px;height:260px;transform:rotateX(58deg) rotateZ(-38deg);transform-style:preserve-3d}.cube{position:absolute;background:#dbeafe;border:2px solid #0f6bdc;box-shadow:0 10px 20px rgba(16,24,40,.18)}.wall3d{background:#475467;border-color:#344054}.door3d{background:#9c6b30;border-color:#7a4f22}.fixture3d{background:#e6eef8;border-color:#0f6bdc}.muted{color:#667085;font-size:13px}.notice{padding:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;color:#1d4ed8;font-size:13px}@media(max-width:980px){.app{grid-template-columns:118px 1fr;grid-template-areas:"top top" "tools work"}.props{display:none}.brand span{display:none}.split,.compare.side{grid-template-columns:1fr}.top{overflow-x:auto}}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><img src="./public/zumen-logo.png" alt="ZUMEN"><span>Plan editor and 3D preview</span></div>
    <div class="menu">
      <label class="fileBtn"><button type="button">Import</button><input id="file" type="file" accept="image/png,image/jpeg"></label>
      <button id="saveJson">Save</button><button id="openJson">Open</button><input id="jsonFile" type="file" accept="application/json" hidden>
      <button id="undo">Undo</button><button id="redo">Redo</button>
    </div>
    <div class="menu right"><button id="png">PNG</button><button id="pdf">PDF</button><button id="word">Word</button></div>
  </header>
  <aside class="tools" id="tools"></aside>
  <main class="work">
    <div class="tabs"><button data-view="edit" class="active">Edit</button><button data-view="compare">Before / After</button><button data-view="split">Plan + 3D</button></div>
    <div class="stage" id="stage"></div>
  </main>
  <aside class="props">
    <section><h2>Revision</h2><div class="seg"><button id="beforeTab">Before</button><button id="afterTab" class="active">After</button></div><button class="primary" id="saveBefore">Save current as before</button><button class="primary ghost" id="saveAfter">Save current as after</button></section>
    <section><h2>View</h2><label>Compare layout</label><select id="layout"><option value="side">Side by side</option><option value="stack">Top and bottom</option><option value="overlay">Overlay</option></select><label>3D mode</label><select id="mode3d"><option>Isometric</option><option>Bird view</option><option>Walkthrough</option></select></section>
    <section><h2>Project</h2><label>Title</label><input id="title" value="ZUMEN proposal"><label>Comments</label><textarea id="comments"></textarea></section>
    <section><h2>Selection</h2><p id="selection" class="muted">Select an item on the plan.</p></section>
    <section><div class="notice">This standalone build works directly on GitHub Pages. It is a first working preview; PDF/Word buttons export simple browser files for now.</div></section>
  </aside>
</div>
<script>
const W=900,H=620;let tool='select',view='edit',active='after',layout='side',zoom=1,pan={x:0,y:0},selected=null,drag=null,history=[],future=[];
const project={title:'ZUMEN proposal',comments:'',before:{image:null,shapes:[]},after:{image:null,shapes:[]}};
const toolNames={select:'Select',pan:'Pan',wall:'Wall',partition:'Partition',door:'Door',slidingDoor:'Sliding door',toilet:'Toilet',urinal:'Urinal',sink:'Wash basin',kitchen:'Sink',desk:'Desk',chair:'Chair',dimension:'Dimension',text:'Text',eraser:'Eraser'};
const tools=Object.keys(toolNames);const sizes={wall:[150,16],partition:[110,12],door:[84,18],slidingDoor:[110,22],toilet:[50,68],urinal:[42,64],sink:[86,54],kitchen:[130,58],desk:[110,74],chair:[44,44],dimension:[160,34],text:[90,32]};
function commit(){history.push(JSON.stringify(project));if(history.length>40)history.shift();future=[]}function clone(o){return JSON.parse(JSON.stringify(o))}function plan(){return project[active]}function id(){return Math.random().toString(36).slice(2)}
function seed(){commit();project.after.shapes=[['wall',130,110,470,16],['wall',130,110,16,310],['wall',130,404,470,16],['wall',584,110,16,310],['partition',350,126,12,278],['door',210,398,76,16],['toilet',480,170,48,64],['sink',455,280,90,52],['desk',180,190,110,72],['chair',215,280,42,42]].map(([kind,x,y,w,h])=>({id:id(),kind,x,y,width:w,height:h}));active='after';render()}
function drawShape(ctx,s,sel=false,faded=false){ctx.save();ctx.globalAlpha=faded?.35:1;ctx.translate(s.x+s.width/2,s.y+s.height/2);ctx.translate(-s.width/2,-s.height/2);ctx.lineWidth=sel?3:2;ctx.strokeStyle=sel?'#0f6bdc':'#111827';ctx.fillStyle=sel?'#dbeafe':'#fff';if(s.kind==='wall'){ctx.fillStyle='#20242b';ctx.fillRect(0,0,s.width,s.height)}else if(s.kind==='partition'){ctx.fillStyle='#667085';ctx.fillRect(0,0,s.width,s.height)}else if(s.kind==='door'){ctx.strokeRect(0,0,s.width,s.height);ctx.beginPath();ctx.moveTo(0,s.height);ctx.arc(0,s.height,Math.max(s.width,50),-Math.PI/2,0);ctx.stroke()}else if(s.kind==='slidingDoor'){ctx.strokeRect(0,s.height*.3,s.width,s.height*.4);ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(s.width-10,0);ctx.moveTo(10,s.height);ctx.lineTo(s.width-10,s.height);ctx.stroke()}else if(s.kind==='toilet'||s.kind==='urinal'){ctx.beginPath();ctx.ellipse(s.width/2,s.height*.55,s.width*.28,s.height*.34,0,0,Math.PI*2);ctx.rect(s.width*.18,4,s.width*.64,s.height*.25);ctx.fill();ctx.stroke()}else if(s.kind==='sink'||s.kind==='kitchen'){ctx.beginPath();ctx.roundRect(0,0,s.width,s.height,8);ctx.ellipse(s.width*.5,s.height*.55,s.width*.28,s.height*.24,0,0,Math.PI*2);ctx.fill();ctx.stroke()}else if(s.kind==='desk'){ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,s.width,s.height);ctx.strokeRect(0,0,s.width,s.height)}else if(s.kind==='chair'){ctx.beginPath();ctx.roundRect(5,5,s.width-10,s.height-10,7);ctx.fill();ctx.stroke()}else if(s.kind==='dimension'){ctx.beginPath();ctx.moveTo(0,s.height/2);ctx.lineTo(s.width,s.height/2);ctx.moveTo(0,4);ctx.lineTo(0,s.height-4);ctx.moveTo(s.width,4);ctx.lineTo(s.width,s.height-4);ctx.stroke();ctx.fillText(s.text||Math.round(s.width*10)+'mm',s.width/2-28,s.height/2-6)}else if(s.kind==='text'){ctx.font='18px sans-serif';ctx.fillStyle='#111827';ctx.fillText(s.text||'Text',0,22)}else{ctx.strokeRect(0,0,s.width,s.height)}if(sel){ctx.setLineDash([5,4]);ctx.strokeStyle='#0f6bdc';ctx.strokeRect(-5,-5,s.width+10,s.height+10)}ctx.restore()}
function drawPlan(canvas,p,opts={}){canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#e5e7eb';for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}if(p.image){const img=new Image();img.onload=()=>{const sc=Math.min(W/img.width,H/img.height)*.92,w=img.width*sc,h=img.height*sc;ctx.globalAlpha=opts.faded?.22:.58;ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h);ctx.globalAlpha=1;p.shapes.forEach(s=>drawShape(ctx,s,s.id===selected,opts.faded))};img.src=p.image}else p.shapes.forEach(s=>drawShape(ctx,s,s.id===selected,opts.faded))}
function renderEdit(container){container.innerHTML='<div class="canvasBar"><button id="minus">-</button><span id="zoom"></span><button id="plus">+</button><button id="fit">Fit</button><span id="selText" class="muted"></span></div><div class="canvasWrap"><canvas id="canvas"></canvas></div>';const c=document.getElementById('canvas'),zw=document.getElementById('zoom');function upd(){drawPlan(c,plan());c.style.transform='translate('+pan.x+'px,'+pan.y+'px) scale('+zoom+')';zw.textContent=Math.round(zoom*100)+'%';document.getElementById('selText').textContent=selected?'Selected: '+toolNames[(plan().shapes.find(s=>s.id===selected)||{}).kind]:'';document.getElementById('selection').textContent=document.getElementById('selText').textContent||'Select an item on the plan.'}upd();document.getElementById('minus').onclick=()=>{zoom=Math.max(.45,zoom-.1);upd()};document.getElementById('plus').onclick=()=>{zoom=Math.min(2.4,zoom+.1);upd()};document.getElementById('fit').onclick=()=>{zoom=1;pan={x:0,y:0};upd()};function pt(e){const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)/zoom,y:(e.clientY-r.top)/zoom}}function hit(pnt){return [...plan().shapes].reverse().find(s=>pnt.x>=s.x&&pnt.x<=s.x+s.width&&pnt.y>=s.y&&pnt.y<=s.y+s.height)}c.onpointerdown=e=>{c.setPointerCapture(e.pointerId);const pnt=pt(e);if(tool==='pan'){drag={type:'pan',sx:e.clientX,sy:e.clientY,pan:{...pan}};return}const h=hit(pnt);if(tool==='eraser'){if(h){commit();plan().shapes=plan().shapes.filter(s=>s.id!==h.id);selected=null;upd()}return}if(tool==='select'){selected=h?.id||null;drag=h?{type:'shape',start:pnt,shape:{...h}}:null;upd();return}if(sizes[tool]){commit();const [w,hg]=sizes[tool],text=tool==='text'?prompt('Text','After'):undefined,s={id:id(),kind:tool,x:pnt.x-w/2,y:pnt.y-hg/2,width:w,height:hg,text};plan().shapes.push(s);selected=s.id;upd()}};c.onpointermove=e=>{if(!drag)return;if(drag.type==='pan'){pan={x:drag.pan.x+e.clientX-drag.sx,y:drag.pan.y+e.clientY-drag.sy};upd()}else{const pnt=pt(e),dx=pnt.x-drag.start.x,dy=pnt.y-drag.start.y,s=plan().shapes.find(x=>x.id===drag.shape.id);if(s){s.x=drag.shape.x+dx;s.y=drag.shape.y+dy;upd()}}};c.onpointerup=()=>drag=null}
function renderCompare(container){container.className='stage compare '+layout;container.innerHTML=layout==='overlay'?'<div class="mini"><canvas id="b"></canvas></div><div class="mini"><canvas id="a"></canvas></div>':'<div class="mini"><h3>Before</h3><canvas id="b"></canvas></div><div class="mini"><h3>After</h3><canvas id="a"></canvas></div>';drawPlan(document.getElementById('b'),project.before,{faded:layout==='overlay'});drawPlan(document.getElementById('a'),project.after)}
function render3D(container){container.className='stage';container.innerHTML='<div class="split"><div class="panel" id="left"></div><div class="panel three"><div class="model" id="model"></div></div></div>';renderEdit(document.getElementById('left'));const m=document.getElementById('model');m.innerHTML='';project.after.shapes.filter(s=>!['text','dimension'].includes(s.kind)).forEach(s=>{const d=document.createElement('div');d.className='cube '+(s.kind.includes('door')?'door3d':(s.kind==='wall'||s.kind==='partition'?'wall3d':'fixture3d'));d.style.left=(s.x/900*360)+'px';d.style.top=(s.y/620*260)+'px';d.style.width=Math.max(8,s.width/900*360)+'px';d.style.height=Math.max(8,s.height/620*260)+'px';m.appendChild(d)})}
function render(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));document.getElementById('beforeTab').classList.toggle('active',active==='before');document.getElementById('afterTab').classList.toggle('active',active==='after');const st=document.getElementById('stage');st.className='stage';if(view==='edit')renderEdit(st);else if(view==='compare')renderCompare(st);else render3D(st);document.querySelectorAll('#tools button').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool))}
function init(){document.getElementById('tools').innerHTML='<button id="sample">Sample</button>'+tools.map(t=>'<button data-tool="'+t+'">'+toolNames[t]+'</button>').join('');document.getElementById('sample').onclick=seed;document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{tool=b.dataset.tool;render()});document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{view=b.dataset.view;render()});document.getElementById('beforeTab').onclick=()=>{active='before';render()};document.getElementById('afterTab').onclick=()=>{active='after';render()};document.getElementById('saveBefore').onclick=()=>{commit();project.before=clone(plan());active='before';render()};document.getElementById('saveAfter').onclick=()=>{commit();project.after=clone(plan());active='after';render()};document.getElementById('layout').onchange=e=>{layout=e.target.value;render()};document.getElementById('title').oninput=e=>project.title=e.target.value;document.getElementById('comments').oninput=e=>project.comments=e.target.value;document.getElementById('undo').onclick=()=>{const prev=history.pop();if(prev){future.push(JSON.stringify(project));Object.assign(project,JSON.parse(prev));render()}};document.getElementById('redo').onclick=()=>{const next=future.pop();if(next){history.push(JSON.stringify(project));Object.assign(project,JSON.parse(next));render()}};document.getElementById('file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{commit();plan().image=String(r.result);render()};r.readAsDataURL(f)};document.getElementById('saveJson').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(project,null,2)],{type:'application/json'}));a.download='ZUMEN-project.json';a.click()};document.getElementById('openJson').onclick=()=>document.getElementById('jsonFile').click();document.getElementById('jsonFile').onchange=async e=>{const f=e.target.files[0];if(f){Object.assign(project,JSON.parse(await f.text()));render()}};document.getElementById('png').onclick=()=>{const c=document.createElement('canvas');drawPlan(c,project.after);const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='ZUMEN-after-plan.png';a.click()};document.getElementById('pdf').onclick=()=>print();document.getElementById('word').onclick=()=>alert('Word export will be added in the React build. Please use PNG/PDF in this preview.');render()}
try{init()}catch(e){document.body.innerHTML='<pre style="padding:24px;font-family:system-ui">ZUMEN error: '+e.message+'</pre>'}
</script>
</body>
</html>
