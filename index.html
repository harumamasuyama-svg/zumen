    *{box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}body{margin:0;font-family:"Segoe UI","Yu Gothic UI",system-ui,sans-serif;background:#eef2f7;color:#1f2937}button,input,select,textarea{font:inherit}button{border:1px solid #d0d5dd;background:#fff;border-radius:6px;min-height:34px;padding:0 10px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:#344054}button:hover,button.active{border-color:#0f6bdc;color:#0f6bdc}button.active,.primary{background:#0f6bdc!important;color:#fff!important;border-color:#0f6bdc!important}.app{height:100vh;overflow:hidden;display:grid;grid-template-columns:164px 1fr 294px;grid-template-rows:56px 1fr;grid-template-areas:"top top top" "tools work props"}.top{grid-area:top;position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid #d0d5dd;display:flex;align-items:center;gap:12px;padding:8px 14px}.brand{display:flex;align-items:center;gap:10px;min-width:292px}.brand img{width:116px;height:40px;object-fit:contain;object-position:left center}.brand span{font-size:13px;color:#667085}.menu{display:flex;gap:8px;align-items:center}.menu.right{margin-left:auto}.fileBtn input{display:none}.tools{grid-area:tools;position:sticky;top:56px;height:calc(100vh - 56px);z-index:10;background:#f8fafc;border-right:1px solid #d0d5dd;padding:10px;display:flex;flex-direction:column;gap:7px;overflow:auto}.tools button{justify-content:flex-start;width:100%;white-space:nowrap}.work{grid-area:work;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}.tabs{height:48px;background:#f8fafc;border-bottom:1px solid #d0d5dd;padding:8px 12px;display:flex;gap:8px}.stage{flex:1;min-height:0;overflow:hidden}.canvasBar{height:44px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;padding:6px 12px}.canvasWrap{height:calc(100% - 44px);max-height:calc(100vh - 148px);overflow:scroll;padding:22px}.canvasWrap canvas,.mini canvas{background:#fff;box-shadow:0 1px 4px rgba(16,24,40,.14);touch-action:none;transform-origin:0 0;display:block}.props{grid-area:props;background:#fff;border-left:1px solid #d0d5dd;padding:14px;overflow:auto}.props section{border-bottom:1px solid #eaecf0;padding-bottom:14px;margin-bottom:14px}h2{font-size:14px;margin:0 0 10px;color:#344054}h3{font-size:14px;margin:0 0 8px;color:#344054}label{display:block;font-size:12px;color:#667085;margin:9px 0 5px}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:6px;padding:8px;background:#fff}textarea{min-height:76px;resize:vertical}.seg{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.primary{width:100%;justify-content:center;margin-top:8px}.ghost{background:#fff!important;color:#0f6bdc!important}.compare{height:100%;padding:18px;gap:16px;overflow:auto}.compare.side{display:grid;grid-template-columns:1fr 1fr}.compare.stack{display:grid;grid-template-rows:auto auto}.mini{background:#fff;border:1px solid #d0d5dd;border-radius:8px;padding:12px}.mini canvas{width:100%;height:auto}.split{height:100%;display:grid;grid-template-columns:minmax(430px,1fr) minmax(360px,.85fr);gap:12px;padding:12px}.split .panel{background:#fff;border:1px solid #d0d5dd;border-radius:8px;overflow:hidden}.muted{color:#667085;font-size:13px}.notice{padding:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;color:#1d4ed8;font-size:13px;line-height:1.6}.hint{font-size:12px;color:#667085;line-height:1.5}.splash{position:fixed;inset:0;background:#fff;z-index:50;display:grid;place-items:center;animation:splashOut .7s ease 2.1s forwards}.splashCard{text-align:center;animation:logoIn 1.4s cubic-bezier(.16,1,.3,1)}.splash img{width:min(460px,70vw);filter:drop-shadow(0 18px 28px rgba(16,24,40,.16))}.splash p{margin:18px 0 0;color:#667085;letter-spacing:.08em}@keyframes logoIn{0%{opacity:0;transform:translateY(18px) scale(.92)}65%{opacity:1;transform:translateY(0) scale(1.03)}100%{opacity:1;transform:translateY(0) s <body>
<div class="splash" id="splash"><div class="splashCard"><img src="./public/zumen-logo.png" alt="ZUMEN"><p>図面編集</p></div></div>
<div class="app">
  <header class="top">
    <div class="brand"><img src="./public/zumen-logo.png" alt="ZUMEN"><span>図面編集</span></div>
    <div class="menu">
      <button id="importBtn" type="button">図面読込</button><button id="enhanceBtn" type="button">くっきり補正</button><button id="tempSave" type="button">一時保存</button><button id="tempLoad" type="button">一時読込</button><button id="clearAll" type="button">リセット</button><input id="file" type="file" accept="application/pdf,image/png,image/jpeg" style="display:none"><input id="projectFile" type="file" accept="application/json,.json" style="display:none">
      <button id="undo">戻る</button><button id="redo">進む</button>
    </div>
    <div class="menu right"><button id="manualPdf" style="background:#667085;color:#fff;border-color:#667085">マニュアル</button><button id="png">PNG</button><button id="pdf">PDF</button><button id="word">Word</button></div>
  </header>
  <aside class="tools" id="tools"></aside>
  <main class="work">
    <div class="tabs"><button data-view="edit" class="active">編集</button><button data-view="compare">改修前後比較</button></div>
    <div class="stage" id="stage"></div>
  </main>
  <aside class="props">
    <section><h2>状態</h2><div class="seg"><button id="beforeTab">改修前</button><button id="afterTab" class="active">改修後</button></div><button class="primary" id="saveBefore">現在を改修前として保存</button><button class="primary ghost" id="saveAfter">現在を改修後として保存</button></section><section id="pdfPagePanel" style="display:none"><h2>PDFページ</h2><label>編集するページ</label><select id="pdfPageSelect"></select><div class="row"><button id="deletePdfPage" type="button">このページを削除</button><button id="appendPdfBtn" type="button">PDFを追加読込</button></div><div class="row"><button id="rotatePdfPage" type="button">右90度回転</button><button id="movePageUp" type="button">上へ</button></div><button id="movePageDown" class="primary ghost" type="button">下へ</button><input id="appendPdfFile" type="file" accept="application/pdf,image/png,image/jpeg" style="display:none"><p class="hint" id="pdfPageHint">PDFの各ページを切り替えて編集できます。</p></section>
    <section><h2>表示</h2><label>比較方法</label><select id="layout"><option value="side">左右比較</option><option value="stack">上下比較</option></select><label>用紙の向き</label><select id="paperOrientation"><option value="landscape">横</option><option value="portrait">縦</option></select><label>印刷サイズ</label><select id="printSize"><option value="fitAll">全体を収める</option><option value="standard">標準</option><option value="large" selected>大きめ</option><option value="max">最大</option></select><label>PDF出力範囲</label><select id="printScope"><option value="current">編集中のページのみ</option><option value="all">全ページ</option></select><label><input id="printBefore" type="checkbox" style="width:auto"> 改修前も出力する</label><label><input id="pageNumOn" type="checkbox" style="width:auto"> ページ番号を付ける</label><div class="row"><div><label>上下</label><select id="pageNumV"><option value="bottom">下</option><option value="top">上</option></select></div><div><label>左右</label><select id="pageNumH"><option value="center">中央</option><option value="left">左端</option><option value="right">右端</option></select></div></div><label>表示形式</label><select id="pageNumStyle"><option value="slash">1/3</option><option value="dash">- 1 -</option><option value="page">1ページ</option></select></section>
    <section><h2>選択部品</h2><p id="selection" class="muted">図面上の部品を選択してください。</p><div id="editProps" style="display:none"><div class="row"><div><label>幅</label><input id="propW" type="number" min="5"></div><div><label>高さ</label><input id="propH" type="number" min="5"></div></div><label>角度</label><input id="propR" type="number" step="5"><div class="row"><button id="rotL">左へ回転</button><button id="rotR">右へ回転</button></div><button id="deleteSelected" class="primary ghost" type="button">選択中の部品を削除</button><div id="textProps" style="display:none"><label>文字内容</label><textarea id="propTextContent" rows="3" placeholder="文字を入力"></textarea><label>フォント</label><select id="propFontFamily"><option value="gothic">ゴシック</option><option value="mincho">明朝</option><option value="meiryo">メイリオ</option></select><div class="row"><div><label>文字サイズ</label><input id="propFont" type="number" min="8" max="96"></div><div><label>文字色</label><input id="propColor" type="color"></div></div></div><div id="doorProps" style="display:none"><label>開き方向</label><select id="doorSwing"><option value="in">内開き</option><option value="out">外開き</option></select><button id="doorFlip" class="primary ghost" type="button">左右反転</button></div><div id="wallProps" style="display:none"><label>太さ</label><input id="wallThick" type="number" min="4" max="80"></div><div id="sinkProps" style="display:none"><label>手洗いの数</label><select id="sinkCount"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div><div id="dimProps" style="display:none"><label><input id="dimArrow" type="checkbox" style="width:auto"> 矢印の先端を表示</label><label><input id="dimShowText" type="checkbox" style="width:auto"> 数値を表示</label><label>数値</label><input id="dimText" type="text" placeholder="例: 1200"><div class="row"><div><label>数値サイズ</label><input id="dimFont" type="number" min="8" max="72"></div><div><label>向き</label><select id="dimTextDir"><option value="horizontal">横書き</option><option value="vertical">縦書き</option></select></div></div><label><input id="dimComma" type="checkbox" style="width:auto"> 3桁コンマを付ける</label></div><div id="shapeProps" style="display:none"><label>図形の種類</label><select id="shapeType"><option value="rect">四角</option><option value="circle">丸</option></select><label><input id="shapeStrokeOn" type="checkbox" style="width:auto"> 枠線を表示</label><div class="row"><div><label>線の太さ</label><input id="shapeLine" type="number" min="1" max="20"></div><div><label>線の色</label><input id="shapeStroke" type="color"></div></div><label><input id="shapeFillOn" type="checkbox" style="width:auto"> 色をベタ塗りする</label><div class="row"><div><label>塗り色</label><input id="shapeFill" type="color"></div><div><label>背景透過</label><input id="shapeAlpha" type="number" min="0" max="100" step="5"></div></div></div><p class="hint">四隅の青い四角で伸縮、上の丸いハンドルで回転できます。</p></div></section>
    <section><h2>消しゴム</h2><label>サイズ</label><select id="eraserSize"><option value="36">A デフォルト</option><option value="18">B 小さい四角</option><option value="9">C さらに小さい四角</option></select><p class="hint">消しゴムは既存図面の線も、追加した部品も消せます。</p></section>
    <section><div class="notice">まずは左の「サンプル」を押してください。壁・間仕切りは選択後に伸縮、回転できます。PDF読込は1ページ目を図面として表示します。</div></section>
  </aside>
</div>
<script>
const W=900,H=620;let tool='select',view='edit',active='after',layout='side',zoom=1,pan={x:0,y:0},selected=null,drag=null,hover=null,rangeBox=null,clipboard=[],clipboardImage=null,rangeStatus='',history=[],future=[],eraserSize=36,activePage=0,paperOrientation='landscape',printSize='large',polyDraft=[],pageNumOn=false,pageNumV='bottom',pageNumH='center',pageNumStyle='slash',printScope='current',printBefore=false;
const project={title:'ZUMEN 改修提案',comments:'',before:{image:null,shapes:[],erasers:[]},after:{image:null,shapes:[],erasers:[]},beforePages:null,afterPages:null};
const toolNames={select:'選択',pan:'画面移動',copyArea:'範囲コピー',cutArea:'範囲切取',pasteArea:'貼り付け',wall:'壁',partition:'間仕切り',door:'開き戸',slidingDoor:'引き戸',toilet:'洋便器',urinal:'小便器',sink:'洗面台',kitchen:'キッチン',handDryer:'ハンドドライヤー',desk:'机',chair:'椅子',dimension:'寸法線',text:'文字',shape:'図形',polygon:'多角形',compass:'方位',eraser:'消しゴム'};
const tools=Object.keys(toolNames);const sizes={wall:[150,16],partition:[110,12],door:[84,84],slidingDoor:[110,22],toilet:[50,68],urinal:[42,64],sink:[86,54],kitchen:[160,58],handDryer:[48,54],desk:[110,74],chair:[44,44],dimension:[160,34],text:[90,32],shape:[96,70],compass:[72,92]};
function commit(){history.push(JSON.stringify(project));if(history.length>40)history.shift();future=[]}function clone(o){return JSON.parse(JSON.stringify(o))}function blankPage(image=null,meta={}){return{image,shapes:[],erasers:[],...meta}}function pageList(name=active){const key=name+'Pages';if(!project[key])project[key]=[project[name]];return project[key]}function plan(){const list=pageList();if(activePage>=list.length)activePage=0;if(!list[activePage])list[activePage]=blankPage();project[active]=list[activePage];const p=list[activePage];p.erasers=p.erasers||[];p.shapes=p.shapes||[];return p}function id(){return Math.random().toString(36).slice(2)}function sel(){return plan().shapes.find(s=>s.id===selected)}
function seed(){commit();project.beforePages=[blankPage()];project.afterPages=[blankPage()];project.before=project.beforePages[0];project.after=project.afterPages[0];activePage=0;project.after.shapes=[['wall',90,90,610,18,0],['wall',90,90,18,360,0],['wall',90,432,610,18,0],['wall',682,90,18,360,0],['partition',340,108,14,324,0],['door',120,356,86,86,0],['slidingDoor',420,424,140,26,0],['toilet',472,146,48,64,0],['urinal',545,148,42,64,0],['sink',438,270,172,54,0],['kitchen',150,130,180,58,0],['handDryer',620,248,48,54,0],['desk',150,270,120,74,0],['chair',190,355,44,44,0],['compass',735,90,72,92,0]].map(([kind,x,y,w,h,r])=>({id:id(),kind,x,y,width:w,height:h,rotation:r||0,sinkCount:kind==='sink'?2:undefined}));active='after';selected=null;render()}
function corners(s){const cx=s.x+s.width/2,cy=s.y+s.height/2,a=(s.rotation||0)*Math.PI/180,pts=[[s.x,s.y],[s.x+s.width,s.y],[s.x+s.width,s.y+s.height],[s.x,s.y+s.height]];return pts.map(([x,y])=>{const dx=x-cx,dy=y-cy;return{x:cx+dx*Math.cos(a)-dy*Math.sin(a),y:cy+dx*Math.sin(a)+dy*Math.cos(a)}})}
function toLocal(s,p){const cx=s.x+s.width/2,cy=s.y+s.height/2,a=-(s.rotation||0)*Math.PI/180,dx=p.x-cx,dy=p.y-cy;return{x:s.width/2+dx*Math.cos(a)-dy*Math.sin(a),y:s.height/2+dx*Math.sin(a)+dy*Math.cos(a)}}
function hitShape(pnt){return [...plan().shapes].reverse().find(s=>{const p=toLocal(s,pnt);return p.x>=0&&p.x<=s.width&&p.y>=0&&p.y<=s.height})}
function normRect(a,b){return{x:Math.min(a.x,b.x),y:Math.min(a.y,b.y),w:Math.abs(a.x-b.x),h:Math.abs(a.y-b.y)}}
function inRect(s,r){return s.x>=r.x&&s.y>=r.y&&s.x+s.width<=r.x+r.w&&s.y+s.height<=r.y+r.h}
function copyShapesIn(r,cut){const source=document.createElement('canvas');drawPlan(source,plan(),{noRange:true});const clip=document.createElement('canvas');clip.width=Math.max(1,Math.round(r.w));clip.height=Math.max(1,Math.round(r.h));clip.getContext('2d').drawImage(source,r.x,r.y,r.w,r.h,0,0,r.w,r.h);clipboardImage={image:clip.toDataURL('image/png'),width:r.w,height:r.h,x:r.x,y:r.y};clipboard=plan().shapes.filter(s=>inRect(s,r)).map(s=>clone(s));rangeStatus=(cut?'範囲を切り取りました。':'範囲をコピーしました。')+'「貼り付け」を押すと配置できます。';if(cut){commit();plan().erasers=plan().erasers||[];plan().erasers.push({type:'rect',x:r.x,y:r.y,w:r.w,h:r.h});const ids=new Set(clipboard.map(s=>s.id));plan().shapes=plan().shapes.filter(s=>!ids.has(s.id));selected=null}}
function pasteClipboard(pos){if(!clipboardImage&&!clipboard.length){alert('コピーする範囲がありません。');return}commit();const baseX=clipboardImage?clipboardImage.x:(clipboard[0]?.x||0),baseY=clipboardImage?clipboardImage.y:(clipboard[0]?.y||0);const dx=pos?pos.x-baseX:24,dy=pos?pos.y-baseY:24;const pasted=[];if(clipboardImage){pasted.push({id:id(),kind:'imagePatch',x:clipboardImage.x+dx,y:clipboardImage.y+dy,width:clipboardImage.width,height:clipboardImage.height,rotation:0,image:clipboardImage.image})}const copies=clipboard.map(s=>({...clone(s),id:id(),x:s.x+dx,y:s.y+dy}));plan().shapes.push(...pasted,...copies);selected=(pasted[0]||copies[0])?.id||null;rangeBox=null;drag=null;rangeStatus='貼り付けました。';tool='select'}
function copySelectedShape(){const s=sel();if(!s)return;clipboard=[clone(s)];clipboardImage=null;rangeStatus='選択中の部品をコピーしました。Ctrl+Vで貼り付けできます。';render()}
function deleteSelectedShape(){if(!selected)return;commit();plan().shapes=plan().shapes.filter(s=>s.id!==selected);selected=null;rangeStatus='選択中の部品を削除しました。';render()}
function handleAt(s,pnt){if(!s)return null;const pts=corners(s),names=['nw','ne','se','sw'];for(let i=0;i<pts.length;i++){if(Math.hypot(pnt.x-pts[i].x,pnt.y-pts[i].y)<10)return names[i]}const top={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};const a=(s.rotation||0)*Math.PI/180;const rot={x:top.x-32*Math.sin(a),y:top.y-32*Math.cos(a)};if(Math.hypot(pnt.x-rot.x,pnt.y-rot.y)<12)return 'rotate';return null}
function drawHandles(ctx,s){const pts=corners(s);ctx.save();ctx.strokeStyle='#0f6bdc';ctx.fillStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();pts.forEach(p=>{ctx.fillRect(p.x-5,p.y-5,10,10);ctx.strokeRect(p.x-5,p.y-5,10,10)});const top={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};const a=(s.rotation||0)*Math.PI/180;const rot={x:top.x-32*Math.sin(a),y:top.y-32*Math.cos(a)};ctx.beginPath();ctx.moveTo(top.x,top.y);ctx.lineTo(rot.x,rot.y);ctx.stroke();ctx.beginPath();ctx.arc(rot.x,rot.y,7,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()}
function fontCss(f){return f==='mincho'?'serif':(f==='meiryo'?'Meiryo, sans-serif':'sans-serif')}
function wordFontCss(f){return f==='mincho'?'serif':(f==='meiryo'?'Meiryo,sans-serif':'Arial,sans-serif')}
