<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZUMEN</title>
  <meta name="theme-color" content="#0f6bdc" />
  <link rel="icon" type="image/png" href="./public/favicon-32.png" />
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Yu Gothic UI",system-ui,sans-serif;background:#eef2f7;color:#1f2937}button,input,select,textarea{font:inherit}button{border:1px solid #d0d5dd;background:#fff;border-radius:6px;min-height:34px;padding:0 10px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:#344054}button:hover,button.active{border-color:#0f6bdc;color:#0f6bdc}button.active,.primary{background:#0f6bdc!important;color:#fff!important;border-color:#0f6bdc!important}.app{height:100vh;display:grid;grid-template-columns:164px 1fr 294px;grid-template-rows:56px 1fr;grid-template-areas:"top top top" "tools work props"}.top{grid-area:top;background:#fff;border-bottom:1px solid #d0d5dd;display:flex;align-items:center;gap:12px;padding:8px 14px}.brand{display:flex;align-items:center;gap:10px;min-width:292px}.brand img{width:116px;height:40px;object-fit:contain;object-position:left center}.brand span{font-size:13px;color:#667085}.menu{display:flex;gap:8px;align-items:center}.menu.right{margin-left:auto}.fileBtn input{display:none}.tools{grid-area:tools;background:#f8fafc;border-right:1px solid #d0d5dd;padding:10px;display:flex;flex-direction:column;gap:7px;overflow:auto}.tools button{justify-content:flex-start;width:100%;white-space:nowrap}.work{grid-area:work;display:flex;flex-direction:column;min-width:0}.tabs{height:48px;background:#f8fafc;border-bottom:1px solid #d0d5dd;padding:8px 12px;display:flex;gap:8px}.stage{flex:1;min-height:0;overflow:hidden}.canvasBar{height:44px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;padding:6px 12px}.canvasWrap{height:calc(100% - 44px);overflow:auto;padding:22px}.canvasWrap canvas,.mini canvas{background:#fff;box-shadow:0 1px 4px rgba(16,24,40,.14);touch-action:none;transform-origin:0 0;display:block}.props{grid-area:props;background:#fff;border-left:1px solid #d0d5dd;padding:14px;overflow:auto}.props section{border-bottom:1px solid #eaecf0;padding-bottom:14px;margin-bottom:14px}h2{font-size:14px;margin:0 0 10px;color:#344054}h3{font-size:14px;margin:0 0 8px;color:#344054}label{display:block;font-size:12px;color:#667085;margin:9px 0 5px}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:6px;padding:8px;background:#fff}textarea{min-height:76px;resize:vertical}.seg{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.primary{width:100%;justify-content:center;margin-top:8px}.ghost{background:#fff!important;color:#0f6bdc!important}.compare{height:100%;padding:18px;gap:16px;overflow:auto}.compare.side{display:grid;grid-template-columns:1fr 1fr}.compare.stack{display:grid;grid-template-rows:auto auto}.compare.overlay{display:grid;place-items:center}.compare.overlay .mini{grid-area:1/1}.compare.overlay .mini:first-child{opacity:.35}.mini{background:#fff;border:1px solid #d0d5dd;border-radius:8px;padding:12px}.mini canvas{width:100%;height:auto}.split{height:100%;display:grid;grid-template-columns:minmax(430px,1fr) minmax(360px,.85fr);gap:12px;padding:12px}.split .panel{background:#fff;border:1px solid #d0d5dd;border-radius:8px;overflow:hidden}.three{height:100%;display:grid;place-items:center;background:linear-gradient(#f8fafc,#eef2f7);perspective:900px}.model{position:relative;width:360px;height:260px;transform:rotateX(58deg) rotateZ(-38deg);transform-style:preserve-3d}.cube{position:absolute;background:#dbeafe;border:2px solid #0f6bdc;box-shadow:0 10px 20px rgba(16,24,40,.18)}.wall3d{background:#475467;border-color:#344054}.door3d{background:#9c6b30;border-color:#7a4f22}.fixture3d{background:#e6eef8;border-color:#0f6bdc}.muted{color:#667085;font-size:13px}.notice{padding:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;color:#1d4ed8;font-size:13px;line-height:1.6}.hint{font-size:12px;color:#667085;line-height:1.5}.splash{position:fixed;inset:0;background:#fff;z-index:50;display:grid;place-items:center;animation:splashOut .7s ease 2.1s forwards}.splashCard{text-align:center;animation:logoIn 1.4s cubic-bezier(.16,1,.3,1)}.splash img{width:min(460px,70vw);filter:drop-shadow(0 18px 28px rgba(16,24,40,.16))}.splash p{margin:18px 0 0;color:#667085;letter-spacing:.08em}@keyframes logoIn{0%{opacity:0;transform:translateY(18px) scale(.92)}65%{opacity:1;transform:translateY(0) scale(1.03)}100%{opacity:1;transform:translateY(0) scale(1)}}@keyframes splashOut{to{opacity:0;visibility:hidden}}@media(max-width:980px){.app{grid-template-columns:126px 1fr;grid-template-areas:"top top" "tools work"}.props{display:none}.brand span{display:none}.split,.compare.side{grid-template-columns:1fr}.top{overflow-x:auto}}
  </style>
</head>
<body>
<div class="splash" id="splash"><div class="splashCard"><img src="./public/zumen-logo.png" alt="ZUMEN"><p>図面編集 × 3Dパース</p></div></div>
<div class="app">
  <header class="top">
    <div class="brand"><img src="./public/zumen-logo.png" alt="ZUMEN"><span>図面編集と3Dパース作成</span></div>
    <div class="menu">
      <button id="importBtn" type="button">図面読込</button><input id="file" type="file" accept="application/pdf,image/png,image/jpeg" style="display:none">
      <button id="undo">戻る</button><button id="redo">進む</button>
    </div>
    <div class="menu right"><button id="png">PNG</button><button id="pdf">PDF</button><button id="word">Word</button></div>
  </header>
  <aside class="tools" id="tools"></aside>
  <main class="work">
    <div class="tabs"><button data-view="edit" class="active">編集</button><button data-view="compare">改修前後比較</button><button data-view="split">平面図 + 3D</button></div>
    <div class="stage" id="stage"></div>
  </main>
  <aside class="props">
    <section><h2>状態</h2><div class="seg"><button id="beforeTab">改修前</button><button id="afterTab" class="active">改修後</button></div><button class="primary" id="saveBefore">現在を改修前として保存</button><button class="primary ghost" id="saveAfter">現在を改修後として保存</button></section>
    <section><h2>表示</h2><label>比較方法</label><select id="layout"><option value="side">左右比較</option><option value="stack">上下比較</option><option value="overlay">重ね合わせ</option></select><label>3D表示</label><select id="mode3d" disabled><option>簡易3Dプレビュー（視点切替は開発中）</option></select><p class="hint">アイソメ図・鳥瞰図・ウォークスルーの切替は今後実装予定です。</p></section>
    <section><h2>選択部品</h2><p id="selection" class="muted">図面上の部品を選択してください。</p><div id="editProps" style="display:none"><div class="row"><div><label>幅</label><input id="propW" type="number" min="5"></div><div><label>高さ</label><input id="propH" type="number" min="5"></div></div><label>角度</label><input id="propR" type="number" step="5"><div class="row"><button id="rotL">左へ回転</button><button id="rotR">右へ回転</button></div><div id="textProps" style="display:none"><div class="row"><div><label>文字サイズ</label><input id="propFont" type="number" min="8" max="96"></div><div><label>文字色</label><input id="propColor" type="color"></div></div></div><p class="hint">四隅の青い四角で伸縮、上の丸いハンドルで回転できます。</p></div></section>
    <section><h2>物件情報</h2><label>タイトル</label><input id="title" value="ZUMEN 改修提案"><label>コメント</label><textarea id="comments"></textarea></section>
    <section><div class="notice">まずは左の「サンプル」を押してください。壁・間仕切りは選択後に伸縮、回転できます。PDF読込は1ページ目を図面として表示します。</div></section>
  </aside>
</div>
<script>
const W=900,H=620;let tool='select',view='edit',active='after',layout='side',zoom=1,pan={x:0,y:0},selected=null,drag=null,hover=null,rangeBox=null,clipboard=[],history=[],future=[];
const project={title:'ZUMEN 改修提案',comments:'',before:{image:null,shapes:[]},after:{image:null,shapes:[]}};
const toolNames={select:'選択',pan:'画面移動',copyArea:'範囲コピー',cutArea:'範囲切取',pasteArea:'貼り付け',wall:'壁',partition:'間仕切り',door:'開き戸',slidingDoor:'引き戸',toilet:'便器',urinal:'小便器',sink:'洗面台',kitchen:'流し',desk:'机',chair:'椅子',dimension:'寸法線',text:'文字',eraser:'消しゴム'};
const tools=Object.keys(toolNames);const sizes={wall:[150,16],partition:[110,12],door:[84,18],slidingDoor:[110,22],toilet:[50,68],urinal:[42,64],sink:[86,54],kitchen:[130,58],desk:[110,74],chair:[44,44],dimension:[160,34],text:[90,32]};
function commit(){history.push(JSON.stringify(project));if(history.length>40)history.shift();future=[]}function clone(o){return JSON.parse(JSON.stringify(o))}function plan(){const p=project[active];p.erasers=p.erasers||[];return p}function id(){return Math.random().toString(36).slice(2)}function sel(){return plan().shapes.find(s=>s.id===selected)}
function seed(){commit();project.after.shapes=[['wall',130,110,470,16,0],['wall',130,110,16,310,0],['wall',130,404,470,16,0],['wall',584,110,16,310,0],['partition',350,126,12,278,0],['door',210,398,76,16,0],['toilet',480,170,48,64,0],['sink',455,280,90,52,0],['desk',180,190,110,74,0],['chair',215,280,44,44,0]].map(([kind,x,y,w,h,r])=>({id:id(),kind,x,y,width:w,height:h,rotation:r||0}));active='after';selected=null;render()}
function corners(s){const cx=s.x+s.width/2,cy=s.y+s.height/2,a=(s.rotation||0)*Math.PI/180,pts=[[s.x,s.y],[s.x+s.width,s.y],[s.x+s.width,s.y+s.height],[s.x,s.y+s.height]];return pts.map(([x,y])=>{const dx=x-cx,dy=y-cy;return{x:cx+dx*Math.cos(a)-dy*Math.sin(a),y:cy+dx*Math.sin(a)+dy*Math.cos(a)}})}
function toLocal(s,p){const cx=s.x+s.width/2,cy=s.y+s.height/2,a=-(s.rotation||0)*Math.PI/180,dx=p.x-cx,dy=p.y-cy;return{x:s.width/2+dx*Math.cos(a)-dy*Math.sin(a),y:s.height/2+dx*Math.sin(a)+dy*Math.cos(a)}}
function hitShape(pnt){return [...plan().shapes].reverse().find(s=>{const p=toLocal(s,pnt);return p.x>=0&&p.x<=s.width&&p.y>=0&&p.y<=s.height})}
function normRect(a,b){return{x:Math.min(a.x,b.x),y:Math.min(a.y,b.y),w:Math.abs(a.x-b.x),h:Math.abs(a.y-b.y)}}
function inRect(s,r){return s.x>=r.x&&s.y>=r.y&&s.x+s.width<=r.x+r.w&&s.y+s.height<=r.y+r.h}
function copyShapesIn(r,cut){clipboard=plan().shapes.filter(s=>inRect(s,r)).map(s=>clone(s));if(cut&&clipboard.length){commit();const ids=new Set(clipboard.map(s=>s.id));plan().shapes=plan().shapes.filter(s=>!ids.has(s.id));selected=null}}
function pasteClipboard(){if(!clipboard.length){alert('コピーする範囲がありません。');return}commit();const copies=clipboard.map(s=>({...clone(s),id:id(),x:s.x+24,y:s.y+24}));plan().shapes.push(...copies);selected=copies[0]?.id||null;tool='select'}
function handleAt(s,pnt){if(!s)return null;const pts=corners(s),names=['nw','ne','se','sw'];for(let i=0;i<pts.length;i++){if(Math.hypot(pnt.x-pts[i].x,pnt.y-pts[i].y)<10)return names[i]}const top={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};const a=(s.rotation||0)*Math.PI/180;const rot={x:top.x-32*Math.sin(a),y:top.y-32*Math.cos(a)};if(Math.hypot(pnt.x-rot.x,pnt.y-rot.y)<12)return 'rotate';return null}
function drawHandles(ctx,s){const pts=corners(s);ctx.save();ctx.strokeStyle='#0f6bdc';ctx.fillStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();pts.forEach(p=>{ctx.fillRect(p.x-5,p.y-5,10,10);ctx.strokeRect(p.x-5,p.y-5,10,10)});const top={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};const a=(s.rotation||0)*Math.PI/180;const rot={x:top.x-32*Math.sin(a),y:top.y-32*Math.cos(a)};ctx.beginPath();ctx.moveTo(top.x,top.y);ctx.lineTo(rot.x,rot.y);ctx.stroke();ctx.beginPath();ctx.arc(rot.x,rot.y,7,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()}
function drawShape(ctx,s,selFlag=false,faded=false){ctx.save();ctx.globalAlpha=faded?.35:1;ctx.translate(s.x+s.width/2,s.y+s.height/2);ctx.rotate((s.rotation||0)*Math.PI/180);ctx.translate(-s.width/2,-s.height/2);ctx.lineWidth=selFlag?3:2;ctx.strokeStyle=selFlag?'#0f6bdc':'#111827';ctx.fillStyle=selFlag?'#dbeafe':'#fff';if(s.kind==='wall'){ctx.fillStyle='#20242b';ctx.fillRect(0,0,s.width,s.height)}else if(s.kind==='partition'){ctx.fillStyle='#667085';ctx.fillRect(0,0,s.width,s.height)}else if(s.kind==='door'){ctx.strokeRect(0,0,s.width,s.height);ctx.beginPath();ctx.moveTo(0,s.height);ctx.arc(0,s.height,Math.max(s.width,50),-Math.PI/2,0);ctx.stroke()}else if(s.kind==='slidingDoor'){ctx.strokeRect(0,s.height*.3,s.width,s.height*.4);ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(s.width-10,0);ctx.moveTo(10,s.height);ctx.lineTo(s.width-10,s.height);ctx.stroke()}else if(s.kind==='toilet'){ctx.beginPath();ctx.ellipse(s.width/2,s.height*.58,s.width*.3,s.height*.34,0,0,Math.PI*2);ctx.rect(s.width*.18,4,s.width*.64,s.height*.25);ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(s.width/2,s.height*.58,Math.min(s.width,s.height)*.09,0,Math.PI*2);ctx.stroke()}else if(s.kind==='urinal'){ctx.beginPath();ctx.roundRect(s.width*.22,3,s.width*.56,s.height*.78,14);ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(s.width*.5,s.height*.24);ctx.lineTo(s.width*.5,s.height*.8);ctx.moveTo(s.width*.36,s.height*.52);ctx.lineTo(s.width*.64,s.height*.52);ctx.stroke()}else if(s.kind==='sink'||s.kind==='kitchen'){ctx.beginPath();ctx.roundRect(0,0,s.width,s.height,8);ctx.ellipse(s.width*.5,s.height*.55,s.width*.28,s.height*.24,0,0,Math.PI*2);ctx.fill();ctx.stroke()}else if(s.kind==='desk'){ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,s.width,s.height);ctx.strokeRect(0,0,s.width,s.height)}else if(s.kind==='chair'){ctx.beginPath();ctx.roundRect(5,5,s.width-10,s.height-10,7);ctx.fill();ctx.stroke()}else if(s.kind==='dimension'){const y=s.height/2;ctx.beginPath();ctx.moveTo(10,y);ctx.lineTo(s.width-10,y);ctx.moveTo(10,y);ctx.lineTo(22,y-7);ctx.moveTo(10,y);ctx.lineTo(22,y+7);ctx.moveTo(s.width-10,y);ctx.lineTo(s.width-22,y-7);ctx.moveTo(s.width-10,y);ctx.lineTo(s.width-22,y+7);ctx.moveTo(0,4);ctx.lineTo(0,s.height-4);ctx.moveTo(s.width,4);ctx.lineTo(s.width,s.height-4);ctx.stroke();ctx.font='13px sans-serif';ctx.fillStyle='#111827';ctx.fillText(s.text||Math.round(s.width*10)+'mm',s.width/2-28,y-8)}else if(s.kind==='text'){ctx.font=(s.fontSize||18)+'px sans-serif';ctx.fillStyle=s.color||'#111827';ctx.fillText(s.text||'文字',0,(s.fontSize||18)+4)}else{ctx.strokeRect(0,0,s.width,s.height)}ctx.restore();if(selFlag)drawHandles(ctx,s)}
function drawPlan(canvas,p,opts={}){p.erasers=p.erasers||[];canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#e5e7eb';for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}function masks(){ctx.save();ctx.fillStyle='#fff';p.erasers.forEach(e=>{ctx.beginPath();ctx.arc(e.x,e.y,e.r||18,0,Math.PI*2);ctx.fill()});ctx.restore()}function shapes(){masks();p.shapes.forEach(s=>drawShape(ctx,s,s.id===selected,opts.faded));if(rangeBox){ctx.save();ctx.strokeStyle='#0f6bdc';ctx.setLineDash([6,4]);ctx.lineWidth=2;ctx.strokeRect(rangeBox.x,rangeBox.y,rangeBox.w,rangeBox.h);ctx.restore()}}if(p.image){if(!p._img||p._img.src!==p.image){p._img=new Image();p._img.onload=()=>drawPlan(canvas,p,opts);p._img.src=p.image;shapes();return}if(p._img.complete&&p._img.naturalWidth){const img=p._img,sc=Math.min(W/img.width,H/img.height)*.92,w=img.width*sc,h=img.height*sc;ctx.globalAlpha=opts.faded?.22:.58;ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h);ctx.globalAlpha=1}shapes()}else shapes()}
function updateProps(){const s=sel(),box=document.getElementById('editProps'),text=document.getElementById('selection'),tp=document.getElementById('textProps');if(!s){text.textContent='図面上の部品を選択してください。';box.style.display='none';return}text.textContent='選択中: '+toolNames[s.kind];box.style.display='block';document.getElementById('propW').value=Math.round(s.width);document.getElementById('propH').value=Math.round(s.height);document.getElementById('propR').value=Math.round(s.rotation||0);tp.style.display=s.kind==='text'?'block':'none';if(s.kind==='text'){document.getElementById('propFont').value=s.fontSize||18;document.getElementById('propColor').value=s.color||'#111827'}}
function renderEdit(container){container.innerHTML='<div class="canvasBar"><button id="minus">-</button><span id="zoom"></span><button id="plus">+</button><button id="fit">全体</button><span id="selText" class="muted"></span></div><div class="canvasWrap"><canvas id="canvas"></canvas></div>';const c=document.getElementById('canvas'),zw=document.getElementById('zoom');function upd(){drawPlan(c,plan());if(tool==='eraser'&&hover){const ec=c.getContext('2d');ec.save();ec.strokeStyle='#0f6bdc';ec.fillStyle='rgba(15,107,220,.12)';ec.lineWidth=2;ec.beginPath();ec.arc(hover.x,hover.y,18,0,Math.PI*2);ec.fill();ec.stroke();ec.beginPath();ec.moveTo(hover.x-8,hover.y+8);ec.lineTo(hover.x+8,hover.y-8);ec.stroke();ec.restore()}c.style.transform='none';c.style.width=(W*zoom)+'px';c.style.height=(H*zoom)+'px';zw.textContent=Math.round(zoom*100)+'%';document.getElementById('selText').textContent=sel()?'選択中: '+toolNames[sel().kind]:'';updateProps()}upd();document.getElementById('minus').onclick=()=>{zoom=Math.max(.45,zoom-.1);upd()};document.getElementById('plus').onclick=()=>{zoom=Math.min(2.4,zoom+.1);upd()};document.getElementById('fit').onclick=()=>{zoom=1;pan={x:0,y:0};upd()};function pt(e){const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)/zoom,y:(e.clientY-r.top)/zoom}}c.onpointerdown=e=>{c.setPointerCapture(e.pointerId);const pnt=pt(e),s=sel(),handle=tool==='select'?handleAt(s,pnt):null;if(handle){commit();drag={type:handle,start:pnt,shape:clone(s)};return}if(tool==='pasteArea'){pasteClipboard();render();return}if(tool==='copyArea'||tool==='cutArea'){rangeBox={x:pnt.x,y:pnt.y,w:0,h:0};drag={type:tool,start:pnt};upd();return}if(tool==='pan'){drag={type:'pan',sx:e.clientX,sy:e.clientY,scroll:{x:c.parentElement.scrollLeft,y:c.parentElement.scrollTop}};return}const h=hitShape(pnt);if(tool==='eraser'){commit();plan().erasers=plan().erasers||[];plan().erasers.push({x:pnt.x,y:pnt.y,r:18});if(h){plan().shapes=plan().shapes.filter(s=>s.id!==h.id);selected=null}drag={type:'erase'};upd();return}if(tool==='select'){selected=h?.id||null;drag=h?{type:'move',start:pnt,shape:clone(h)}:null;upd();return}if(sizes[tool]){commit();const [w,hg]=sizes[tool],text=tool==='text'?prompt('入力する文字','改修後'):undefined,s={id:id(),kind:tool,x:pnt.x-w/2,y:pnt.y-hg/2,width:w,height:hg,rotation:0,text,fontSize:18,color:'#111827'};plan().shapes.push(s);selected=s.id;tool='select';upd()}};c.onpointermove=e=>{hover=pt(e);if(!drag){if(tool==='eraser')upd();return}const pnt=pt(e);if(drag.type==='pan'){c.parentElement.scrollLeft=drag.scroll.x-(e.clientX-drag.sx);c.parentElement.scrollTop=drag.scroll.y-(e.clientY-drag.sy);return}if(drag.type==='erase'){plan().erasers=plan().erasers||[];plan().erasers.push({x:pnt.x,y:pnt.y,r:18});const h=hitShape(pnt);if(h)plan().shapes=plan().shapes.filter(s=>s.id!==h.id);upd();return}if(drag.type==='copyArea'||drag.type==='cutArea'){rangeBox=normRect(drag.start,pnt);upd();return}const current=sel();if(!current)return;if(drag.type==='move'){current.x=drag.shape.x+pnt.x-drag.start.x;current.y=drag.shape.y+pnt.y-drag.start.y}else if(drag.type==='rotate'){const cx=drag.shape.x+drag.shape.width/2,cy=drag.shape.y+drag.shape.height/2;current.rotation=Math.round((Math.atan2(pnt.y-cy,pnt.x-cx)*180/Math.PI+90)/5)*5}else{const local=toLocal(drag.shape,pnt);let nx=drag.shape.x,ny=drag.shape.y,nw=drag.shape.width,nh=drag.shape.height;if(drag.type.includes('e'))nw=Math.max(8,local.x);if(drag.type.includes('s'))nh=Math.max(8,local.y);if(drag.type.includes('w')){nw=Math.max(8,drag.shape.width-local.x);nx=drag.shape.x+local.x}if(drag.type.includes('n')){nh=Math.max(8,drag.shape.height-local.y);ny=drag.shape.y+local.y}current.x=nx;current.y=ny;current.width=nw;current.height=nh}upd()};c.onpointerleave=()=>{hover=null;if(tool==='eraser')upd()};c.onpointerup=()=>{if(drag&&(drag.type==='copyArea'||drag.type==='cutArea')){if(rangeBox&&rangeBox.w>8&&rangeBox.h>8)copyShapesIn(rangeBox,drag.type==='cutArea');rangeBox=null;tool='pasteArea';render();return}drag=null}}
function renderCompare(container){container.className='stage compare '+layout;container.innerHTML=layout==='overlay'?'<div class="mini"><canvas id="b"></canvas></div><div class="mini"><canvas id="a"></canvas></div>':'<div class="mini"><h3>改修前</h3><canvas id="b"></canvas></div><div class="mini"><h3>改修後</h3><canvas id="a"></canvas></div>';drawPlan(document.getElementById('b'),project.before,{faded:layout==='overlay'});drawPlan(document.getElementById('a'),project.after)}
function render3D(container){container.className='stage';container.innerHTML='<div class="split"><div class="panel" id="left"></div><div class="panel three"><div><div class="notice" style="margin:12px">3D視点切替は開発中です。現在は簡易3Dプレビューのみ表示します。</div><div class="model" id="model"></div></div></div></div>';renderEdit(document.getElementById('left'));const m=document.getElementById('model');m.innerHTML='';project.after.shapes.filter(s=>!['text','dimension'].includes(s.kind)).forEach(s=>{const d=document.createElement('div');d.className='cube '+(s.kind.includes('door')?'door3d':(s.kind==='wall'||s.kind==='partition'?'wall3d':'fixture3d'));d.style.left=(s.x/900*360)+'px';d.style.top=(s.y/620*260)+'px';d.style.width=Math.max(8,s.width/900*360)+'px';d.style.height=Math.max(8,s.height/620*260)+'px';d.style.transform='rotate('+(s.rotation||0)+'deg)';m.appendChild(d)})}
async function loadPdfAsImage(file){if(!window.pdfjsLib){await new Promise((resolve,reject)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=resolve;s.onerror=reject;document.head.appendChild(s)})}pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;const page=await pdf.getPage(1);const viewport=page.getViewport({scale:1.8});const c=document.createElement('canvas');c.width=viewport.width;c.height=viewport.height;await page.render({canvasContext:c.getContext('2d'),viewport}).promise;return c.toDataURL('image/png')}
function render(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));document.getElementById('beforeTab').classList.toggle('active',active==='before');document.getElementById('afterTab').classList.toggle('active',active==='after');const st=document.getElementById('stage');st.className='stage';if(view==='edit')renderEdit(st);else if(view==='compare')renderCompare(st);else render3D(st);document.querySelectorAll('#tools button').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));updateProps()}
function init(){document.getElementById('splash').onclick=()=>document.getElementById('splash').style.display='none';document.getElementById('tools').innerHTML='<button id="sample">サンプル</button>'+tools.map(t=>'<button data-tool="'+t+'">'+toolNames[t]+'</button>').join('');document.getElementById('sample').onclick=seed;document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{tool=b.dataset.tool;render()});document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{view=b.dataset.view;render()});document.getElementById('beforeTab').onclick=()=>{active='before';selected=null;render()};document.getElementById('afterTab').onclick=()=>{active='after';selected=null;render()};document.getElementById('saveBefore').onclick=()=>{commit();project.before=clone(plan());active='before';selected=null;render()};document.getElementById('saveAfter').onclick=()=>{commit();project.after=clone(plan());active='after';selected=null;render()};document.getElementById('layout').onchange=e=>{layout=e.target.value;render()};document.getElementById('title').oninput=e=>project.title=e.target.value;document.getElementById('comments').oninput=e=>project.comments=e.target.value;document.getElementById('propW').onchange=e=>{const s=sel();if(s){commit();s.width=Math.max(8,+e.target.value);render()}};document.getElementById('propH').onchange=e=>{const s=sel();if(s){commit();s.height=Math.max(8,+e.target.value);render()}};document.getElementById('propR').onchange=e=>{const s=sel();if(s){commit();s.rotation=+e.target.value;render()}};document.getElementById('propFont').onchange=e=>{const s=sel();if(s){commit();s.fontSize=Math.max(8,+e.target.value);render()}};document.getElementById('propColor').oninput=e=>{const s=sel();if(s){s.color=e.target.value;render()}};document.getElementById('rotL').onclick=()=>{const s=sel();if(s){commit();s.rotation=(s.rotation||0)-15;render()}};document.getElementById('rotR').onclick=()=>{const s=sel();if(s){commit();s.rotation=(s.rotation||0)+15;render()}};document.getElementById('importBtn').onclick=()=>document.getElementById('file').click();document.getElementById('undo').onclick=()=>{const prev=history.pop();if(prev){future.push(JSON.stringify(project));Object.assign(project,JSON.parse(prev));selected=null;render()}};document.getElementById('redo').onclick=()=>{const next=future.pop();if(next){history.push(JSON.stringify(project));Object.assign(project,JSON.parse(next));selected=null;render()}};document.getElementById('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;const btn=document.getElementById('importBtn');const old=btn.textContent;btn.textContent='読込中...';btn.disabled=true;try{commit();if(f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf')){plan().image=await loadPdfAsImage(f)}else{plan().image=await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(String(r.result));r.onerror=reject;r.readAsDataURL(f)})}render()}catch(err){alert('PDFの読込に失敗しました。インターネット接続が必要な場合があります。\n'+err.message)}finally{btn.textContent=old;btn.disabled=false;e.target.value=''}};document.getElementById('png').onclick=()=>{const c=document.createElement('canvas');drawPlan(c,project.after);const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='ZUMEN-after-plan.png';a.click()};document.getElementById('pdf').onclick=()=>{const c=document.createElement('canvas');drawPlan(c,project.after);const data=c.toDataURL('image/png');const w=window.open('','_blank');w.document.write('<!doctype html><html><head><title>ZUMEN PDF</title><style>@page{size:A4 landscape;margin:10mm}body{margin:0;display:grid;place-items:center;height:100vh;background:#fff}img{width:277mm;height:auto;max-height:190mm;object-fit:contain}</style></head><body><img src="'+data+'"><script>window.onload=()=>setTimeout(()=>print(),300)<\/script></body></html>');w.document.close()};document.getElementById('word').onclick=()=>alert('Word出力は次の段階で本格対応します。現在はPNG/PDFをご利用ください。');render()}
